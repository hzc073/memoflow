    <text x="86" y="231" fill="#667085" font-family="Arial, sans-serif" font-size="12">图片压缩、组件设置</text>

    <rect x="36" y="264" width="258" height="74" rx="14" fill="#E9F6F0" stroke="#7BC6A4" stroke-width="1.5"/>
    <circle cx="62" cy="301" r="13" fill="#C8F2DC"/>
    <path d="M56 301c3-5 9-5 12 0M57 306h10" stroke="#087443" stroke-width="2" stroke-linecap="round"/>
    <text x="86" y="295" fill="#101828" font-family="Arial, sans-serif" font-size="15" font-weight="700">反馈</text>
    <text x="86" y="316" fill="#667085" font-family="Arial, sans-serif" font-size="12">日志、自助修复、问题反馈</text>
    <path d="M277 296l7 7-7 7" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="36" y="380" fill="#667085" font-family="Arial, sans-serif" font-size="12" font-weight="700">路径</text>
    <rect x="36" y="396" width="258" height="42" rx="12" fill="#F9FAFB"/>
    <text x="54" y="423" fill="#344054" font-family="Arial, sans-serif" font-size="14">设置 → 反馈</text>
  </g>

  <g transform="translate(455 160)">
    <rect x="0" y="0" width="330" height="620" rx="28" fill="#101828"/>
    <rect x="16" y="18" width="298" height="584" rx="22" fill="#FFFFFF"/>
    <rect x="136" y="34" width="58" height="5" rx="2.5" fill="#D0D5DD"/>
    <text x="36" y="76" fill="#101828" font-family="Arial, sans-serif" font-size="22" font-weight="700">反馈</text>

    <rect x="36" y="108" width="258" height="74" rx="14" fill="#F2F4F7"/>
    <circle cx="62" cy="145" r="13" fill="#E0EAFF"/>
    <path d="M56 141h12M56 146h8M56 151h10" stroke="#2F5AAC" stroke-width="2" stroke-linecap="round"/>
