<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#F5F7FA"/>

  <text x="80" y="78" fill="#18212F" font-family="Arial, sans-serif" font-size="30" font-weight="700">媒体缓存清理 · 自助修复入口效果图</text>
  <text x="80" y="113" fill="#667085" font-family="Arial, sans-serif" font-size="16">入口固定在 设置 → 反馈 → 自助修复；第一版只做总量/分类清理，不做缓存图片图库或逐图选择。</text>

  <g transform="translate(80 160)">
    <rect x="0" y="0" width="330" height="620" rx="28" fill="#101828"/>
    <rect x="16" y="18" width="298" height="584" rx="22" fill="#FFFFFF"/>
    <rect x="136" y="34" width="58" height="5" rx="2.5" fill="#D0D5DD"/>
