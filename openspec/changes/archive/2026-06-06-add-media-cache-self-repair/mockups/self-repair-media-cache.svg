    <text x="106" y="197" fill="#667085" font-family="Arial, sans-serif" font-size="12">从当前笔记正文重建 #tag</text>

    <rect x="48" y="230" width="424" height="70" rx="14" fill="#F9FAFB" stroke="#EAECF0"/>
    <circle cx="78" cy="265" r="14" fill="#E0EAFF"/>
    <path d="M73 265h10M83 265l5 5" stroke="#2F5AAC" stroke-width="2" stroke-linecap="round"/>
    <text x="106" y="260" fill="#101828" font-family="Arial, sans-serif" font-size="15" font-weight="700">重建搜索索引</text>
    <text x="106" y="281" fill="#667085" font-family="Arial, sans-serif" font-size="12">恢复本地关键词搜索数据</text>

    <rect x="48" y="314" width="424" height="70" rx="14" fill="#F9FAFB" stroke="#EAECF0"/>
    <circle cx="78" cy="349" r="14" fill="#E9D7FE"/>
    <path d="M72 354h12M74 349h8M76 344h4" stroke="#7F56D9" stroke-width="2" stroke-linecap="round"/>
    <text x="106" y="344" fill="#101828" font-family="Arial, sans-serif" font-size="15" font-weight="700">重建统计缓存</text>
    <text x="106" y="365" fill="#667085" font-family="Arial, sans-serif" font-size="12">热力图、标签统计、概要计数</text>

    <rect x="48" y="410" width="424" height="172" rx="18" fill="#EEF8F3" stroke="#7BC6A4" stroke-width="1.5"/>
    <circle cx="78" cy="449" r="16" fill="#C8F2DC"/>
    <path d="M72 449h12M75 443h6M75 455h6" stroke="#087443" stroke-width="2" stroke-linecap="round"/>
    <text x="106" y="442" fill="#101828" font-family="Arial, sans-serif" font-size="17" font-weight="700">清理媒体缓存</text>
    <text x="106" y="464" fill="#667085" font-family="Arial, sans-serif" font-size="12">释放图片缓存和视频缩略图占用空间</text>

    <rect x="72" y="486" width="376" height="1" fill="#D6EDE2"/>
    <text x="72" y="516" fill="#344054" font-family="Arial, sans-serif" font-size="13">总计</text>
    <text x="398" y="516" text-anchor="end" fill="#101828" font-family="Arial, sans-serif" font-size="15" font-weight="700">8.7 GB</text>
    <text x="72" y="546" fill="#667085" font-family="Arial, sans-serif" font-size="12">网络图片 8.2 GB · 视频缩略图 240 MB · 临时缓存 310 MB</text>
    <rect x="356" y="528" width="92" height="34" rx="17" fill="#087443"/>
    <text x="402" y="550" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="13" font-weight="700">清理</text>

    <rect x="48" y="606" width="424" height="70" rx="16" fill="#FFF8E6" stroke="#FEDF89"/>
    <circle cx="77" cy="641" r="14" fill="#FEF0C7"/>
    <text x="77" y="646" text-anchor="middle" fill="#B54708" font-family="Arial, sans-serif" font-size="18" font-weight="700">!</text>
    <text x="106" y="636" fill="#101828" font-family="Arial, sans-serif" font-size="14" font-weight="700">不会显示缓存图片列表</text>
    <text x="106" y="657" fill="#667085" font-family="Arial, sans-serif" font-size="12">只做总量/分类级批量清理，避免误解为图库管理。</text>
  </g>

  <g transform="translate(900 304)">
    <rect x="0" y="0" width="380" height="250" rx="24" fill="#FFFFFF" stroke="#D0D5DD" filter="url(#shadow)"/>
    <text x="28" y="42" fill="#101828" font-family="Arial, sans-serif" font-size="19" font-weight="700">清理媒体缓存？</text>
    <text x="28" y="76" fill="#667085" font-family="Arial, sans-serif" font-size="13">将清理网络图片缓存、视频缩略图和临时媒体派生缓存。</text>
    <text x="28" y="104" fill="#667085" font-family="Arial, sans-serif" font-size="13">不会删除笔记、账号、附件源文件、WebDAV 备份或远端数据。</text>

    <rect x="28" y="126" width="324" height="48" rx="12" fill="#F2F4F7"/>
    <text x="48" y="156" fill="#344054" font-family="Arial, sans-serif" font-size="13">预计释放</text>
    <text x="324" y="156" text-anchor="end" fill="#101828" font-family="Arial, sans-serif" font-size="16" font-weight="700">8.7 GB</text>

    <rect x="164" y="194" width="82" height="36" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/>
    <text x="205" y="217" text-anchor="middle" fill="#344054" font-family="Arial, sans-serif" font-size="13" font-weight="700">取消</text>
    <rect x="260" y="194" width="92" height="36" rx="18" fill="#087443"/>
    <text x="306" y="217" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="13" font-weight="700">确认清理</text>
  </g>

  <path d="M420 455C444 455 426 238 455 238" stroke="#98A2B3" stroke-width="2" stroke-dasharray="5 7"/>
  <path d="M795 238C820 238 804 500 830 500" stroke="#98A2B3" stroke-width="2" stroke-dasharray="5 7"/>

  <defs>
    <filter id="shadow" x="-30" y="-30" width="440" height="310" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#101828" flood-opacity="0.18"/>
