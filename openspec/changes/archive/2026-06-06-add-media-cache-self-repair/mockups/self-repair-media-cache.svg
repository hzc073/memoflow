    <text x="86" y="160" fill="#667085" font-family="Arial, sans-serif" font-size="12">导出诊断信息</text>

    <rect x="36" y="198" width="258" height="82" rx="14" fill="#E9F6F0" stroke="#7BC6A4" stroke-width="1.5"/>
    <circle cx="62" cy="239" r="13" fill="#C8F2DC"/>
    <path d="M62 231v5M62 242v5M55 239h5M64 239h5" stroke="#087443" stroke-width="2" stroke-linecap="round"/>
    <text x="86" y="232" fill="#101828" font-family="Arial, sans-serif" font-size="15" font-weight="700">自助修复</text>
    <text x="86" y="253" fill="#667085" font-family="Arial, sans-serif" font-size="12">标签、搜索、统计与媒体缓存</text>
    <path d="M277 234l7 7-7 7" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="36" y="296" width="258" height="74" rx="14" fill="#F2F4F7"/>
    <circle cx="62" cy="333" r="13" fill="#FFF2CC"/>
    <path d="M57 333h10M62 328v10" stroke="#B54708" stroke-width="2" stroke-linecap="round"/>
    <text x="86" y="327" fill="#101828" font-family="Arial, sans-serif" font-size="15" font-weight="700">如何反馈</text>
    <text x="86" y="348" fill="#667085" font-family="Arial, sans-serif" font-size="12">打开 GitHub issue</text>
  </g>

  <g transform="translate(830 92)">
    <rect x="0" y="0" width="520" height="740" rx="30" fill="#101828"/>
    <rect x="18" y="20" width="484" height="700" rx="24" fill="#FFFFFF"/>
    <rect x="224" y="38" width="72" height="6" rx="3" fill="#D0D5DD"/>

    <text x="48" y="90" fill="#101828" font-family="Arial, sans-serif" font-size="24" font-weight="700">自助修复</text>
    <text x="48" y="118" fill="#667085" font-family="Arial, sans-serif" font-size="13">这些操作只维护本地派生数据，不会删除笔记或附件源文件。</text>

    <rect x="48" y="146" width="424" height="70" rx="14" fill="#F9FAFB" stroke="#EAECF0"/>
    <circle cx="78" cy="181" r="14" fill="#FCE7F3"/>
