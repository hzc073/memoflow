    <rect x="36" y="104" width="258" height="64" rx="14" fill="#F2F4F7"/>
    <circle cx="62" cy="136" r="13" fill="#D6E4FF"/>
    <path d="M56 136h12M62 130v12" stroke="#2F5AAC" stroke-width="2" stroke-linecap="round"/>
