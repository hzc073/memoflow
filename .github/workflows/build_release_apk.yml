name: Build and Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Resolve release metadata
        id: release_meta
        working-directory: memos_flutter_app
        run: |
          set -euo pipefail
          raw_version="$(sed -nE 's/^[[:space:]]*version:[[:space:]]*([^[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          if [ -z "$raw_version" ]; then
            echo "Cannot read version from pubspec.yaml" >&2
            exit 1
          fi
          version="${raw_version%%+*}"
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $version"
          echo "Resolved release tag: $tag"

      - uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.38.5"
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('memos_flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get dependencies
        working-directory: memos_flutter_app
        run: flutter pub get

      - name: Decode keystore
        working-directory: memos_flutter_app/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_ALIAS:-}" ]; then
            echo "Keystore secrets missing; skip decode."
            exit 0
          fi
          mkdir -p app/keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/keystore/release.jks

      - name: Create key.properties
        working-directory: memos_flutter_app/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_ALIAS:-}" ]; then
            echo "Keystore secrets missing; skip key.properties."
            exit 0
          fi
          cat > key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=keystore/release.jks
          EOF

      - name: Build APK packages
        working-directory: memos_flutter_app
        shell: pwsh
        run: |
          $scriptPath = "./tool/build_apk.ps1"
          $scriptParameters = (Get-Command $scriptPath).Parameters
          $buildArgs = @{
            NoPubGet = $true
            Flavor = "full"
            BuildApk = $true
            SplitPerAbi = $true
            OutDir = "./dist/apk"
          }
          if ($scriptParameters.ContainsKey("IncludeUniversalApk")) {
            $buildArgs.IncludeUniversalApk = $true
          } else {
            Write-Warning "build_apk.ps1 does not support -IncludeUniversalApk; building split APKs only."
          }
          & $scriptPath @buildArgs
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Create release and upload APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: "memos_flutter_app/dist/apk/MemoFlow_v*-full*-release.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release_meta.outputs.tag }}
          commit: ${{ github.sha }}
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true

      - name: Trigger CF update-config worker
        env:
          CF_UPDATE_CONFIG_URL: ${{ secrets.CF_UPDATE_CONFIG_URL }}
          CF_UPDATE_CONFIG_TOKEN: ${{ secrets.CF_UPDATE_CONFIG_TOKEN }}
          CF_UPDATE_CONFIG_REPO: ${{ vars.CF_UPDATE_CONFIG_REPO }}
          CF_UPDATE_CONFIG_BRANCH: ${{ vars.CF_UPDATE_CONFIG_BRANCH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${CF_UPDATE_CONFIG_URL:-}" ] || [ -z "${CF_UPDATE_CONFIG_TOKEN:-}" ]; then
            echo "CF update-config secrets not configured; skip trigger."
            exit 0
          fi
          tag="${RELEASE_VERSION}"
          payload="$(jq -n \
            --arg tag "$tag" \
            --arg app_repo "$GITHUB_REPOSITORY" \
            --arg config_repo "${CF_UPDATE_CONFIG_REPO:-}" \
            --arg config_branch "${CF_UPDATE_CONFIG_BRANCH:-}" \
            '{tag: $tag, app_repo: $app_repo}
            + (if ($config_repo | length) > 0 then {config_repo: $config_repo} else {} end)
            + (if ($config_branch | length) > 0 then {config_branch: $config_branch} else {} end)')"
          curl -fsS -X POST "$CF_UPDATE_CONFIG_URL" \
            -H "content-type: application/json" \
            -H "x-update-token: $CF_UPDATE_CONFIG_TOKEN" \
            --data "$payload"
