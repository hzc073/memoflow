<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #f3f4f6; }
  </style>
  <script>
    function memoflowEmit(payload) {
      const message = JSON.stringify(payload);
      if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) {
        window.chrome.webview.postMessage(message);
        return;
      }
      if (window.MemoflowHost && window.MemoflowHost.postMessage) {
        window.MemoflowHost.postMessage(message);
      }
    }
    window.onerror = function(message, source, lineno, colno) {
      memoflowEmit({
        type: 'error',
        message: String(message) + ' @ ' + String(source || '') + ':' + String(lineno || 0) + ':' + String(colno || 0)
      });
    };
  </script>
  <script>
    let memoflowGoogleMap;
    function memoflowInitMap() {
      try {
        memoflowGoogleMap = new google.maps.Map(document.getElementById('map'), {
          center: { lat: __LAT__, lng: __LNG__ },
          zoom: __ZOOM__,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false,
          clickableIcons: false,
        });
        window.memoflowMap = {
          moveTo: function(lat, lng, zoom) {
            if (!memoflowGoogleMap) return;
            memoflowGoogleMap.setCenter({ lat: lat, lng: lng });
            if (typeof zoom === 'number') {
              memoflowGoogleMap.setZoom(zoom);
            }
          }
        };
        google.maps.event.addListenerOnce(memoflowGoogleMap, 'idle', function () {
          const center = memoflowGoogleMap.getCenter();
          memoflowEmit({ type: 'ready', lat: center.lat(), lng: center.lng(), zoom: memoflowGoogleMap.getZoom() });
        });
        memoflowGoogleMap.addListener('idle', function () {
          const center = memoflowGoogleMap.getCenter();
          memoflowEmit({ type: 'cameraIdle', lat: center.lat(), lng: center.lng(), zoom: memoflowGoogleMap.getZoom() });
        });
        memoflowGoogleMap.addListener('click', function (event) {
          memoflowEmit({ type: 'tap', lat: event.latLng.lat(), lng: event.latLng.lng(), zoom: memoflowGoogleMap.getZoom() });
        });
      } catch (error) {
        memoflowEmit({ type: 'error', message: String(error) });
      }
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=__API_KEY__&callback=memoflowInitMap"></script>
</head>
<body>
  <div id="map"></div>
</body>
</html>
