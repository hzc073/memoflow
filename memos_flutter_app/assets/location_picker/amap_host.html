<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #f3f4f6; }
  </style>
  <script>
    function memoflowEmit(payload) {
      const message = JSON.stringify(payload);
      if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) {
        window.chrome.webview.postMessage(message);
        return;
      }
      if (window.MemoflowHost && window.MemoflowHost.postMessage) {
        window.MemoflowHost.postMessage(message);
      }
    }
    window.onerror = function(message, source, lineno, colno) {
      memoflowEmit({
        type: 'error',
        message: String(message) + ' @ ' + String(source || '') + ':' + String(lineno || 0) + ':' + String(colno || 0)
      });
    };
    window._AMapSecurityConfig = {
      securityJsCode: '__SECURITY_KEY__'
    };
  </script>
  <script src="https://webapi.amap.com/maps?v=1.4.15&key=__API_KEY__"></script>
</head>
<body>
  <div id="map"></div>
  <script>
    (function () {
      let map;
      function emit(type, payload) {
        memoflowEmit(Object.assign({ type: type }, payload || {}));
      }
      function currentCenterPayload(type) {
        if (!map) return;
        const center = map.getCenter();
        emit(type, {
          lat: center.lat,
          lng: center.lng,
          zoom: map.getZoom()
        });
      }
      window.memoflowMap = {
        moveTo: function(lat, lng, zoom) {
          if (!map) return;
          const nextZoom = typeof zoom === 'number' ? zoom : map.getZoom();
          map.setZoomAndCenter(nextZoom, [lng, lat]);
        }
      };
      try {
        map = new AMap.Map('map', {
          zoom: __ZOOM__,
          center: [__LNG__, __LAT__],
          resizeEnable: true,
          dragEnable: true,
          zoomEnable: true,
          doubleClickZoom: true
        });
        map.on('complete', function () {
          currentCenterPayload('ready');
        });
        map.on('moveend', function () {
          currentCenterPayload('cameraIdle');
        });
        map.on('zoomend', function () {
          currentCenterPayload('cameraIdle');
        });
        map.on('click', function (event) {
          emit('tap', {
            lat: event.lnglat.lat,
            lng: event.lnglat.lng,
            zoom: map.getZoom()
          });
        });
      } catch (error) {
        emit('error', { message: String(error) });
      }
    })();
  </script>
</body>
</html>
